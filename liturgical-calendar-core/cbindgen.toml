# cbindgen.toml — liturgical-calendar-core
# Génère kal_engine.h exposant l'ABI C de l'Engine.

language = "C"
header = """
/* kal_engine.h — Généré automatiquement par cbindgen. Ne pas éditer manuellement.
 * Liturgical Calendar Engine v2.0 — Interface C (ABI stable).
 * Compatible : C99, Zig, WebAssembly.
 */"""

include_guard = "KAL_ENGINE_H"
tab_width = 4
documentation = true
documentation_style = "c99"

[export]
include = [
    "KalHeader",
    "KalCalendarEntry",
    "KAL_ENGINE_OK",
    "KAL_ERR_NULL_PTR",
    "KAL_ERR_BUF_TOO_SMALL",
    "KAL_ERR_MAGIC",
    "KAL_ERR_VERSION",
    "KAL_ERR_CHECKSUM",
    "KAL_ERR_FILE_SIZE",
    "KAL_ERR_INDEX_OOB",
    "KAL_ERR_POOL_OOB",
    "KAL_ERR_RESERVED",
    "kal_validate_header",
    "kal_read_entry",
    "kal_read_secondary",
    "kal_scan_flags",
]
rename_types = "PascalCase"

[struct]
rename_fields = "snake_case"

[defines]
"target_pointer_width = 64" = "KAL_TARGET_64BIT"
