# cbindgen.toml — Configuration de génération du header C pour liturgical-calendar-core.
#
# Génère : kal_engine.h
# Usage  : cbindgen --config cbindgen.toml --crate liturgical-calendar-core --output kal_engine.h
# Ou via : cargo build --features gen-headers (appel depuis build.rs)

language = "C"
header   = """/* kal_engine.h — Engine liturgical calendar v2.0
 * Auto-generated by cbindgen — do not edit manually.
 * Source : liturgical-calendar-core (no_std, no_alloc, C-ABI)
 */"""
include_guard = "KAL_ENGINE_H"
tab_width     = 4
documentation = true

# Inclure stdint.h pour uint8_t, uint16_t, uint32_t, int32_t.
includes      = ["stdint.h", "stddef.h"]

# Exporter les structs avec leurs noms renommés.
[export]
# Inclure explicitement les types et constantes à exporter.
include = [
    "Header",
    "CalendarEntry",
    "KAL_ENGINE_OK",
    "KAL_ERR_NULL_PTR",
    "KAL_ERR_BUF_TOO_SMALL",
    "KAL_ERR_MAGIC",
    "KAL_ERR_VERSION",
    "KAL_ERR_CHECKSUM",
    "KAL_ERR_FILE_SIZE",
    "KAL_ERR_INDEX_OOB",
    "KAL_ERR_POOL_OOB",
    "KAL_ERR_RESERVED",
]
prefix = "Kal"

[export.rename]
"Header"        = "KalHeader"
"CalendarEntry" = "KalCalendarEntry"

[parse]
parse_deps = false

# Garantir que les structs sont générées avec les annotations d'alignement C.
[struct]
derive_eq           = false
derive_neq          = false
must_use            = false
derive_constructor  = false

# Constantes exportées comme #define (pas d'enum C).
[const]
allow_static_const = true
